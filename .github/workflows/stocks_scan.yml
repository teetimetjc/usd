name: Stock Scanner

on:
  schedule:
    # Every 20 minutes, Mon–Fri, 9 AM–5 PM ET (UTC-5/4 depending on DST)
    # 13:00–21:00 UTC covers both EST and EDT with buffer
    - cron: '0,20,40 13-21 * * 1-5'
  workflow_dispatch:  # also runnable manually from the Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install gspread

      - name: Run stock scan
        env:
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python -c "import stocks; stocks.run_scan()"
