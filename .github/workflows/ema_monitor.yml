name: EUR/USD EMA Monitor

on:
  # Manual trigger only — re-enable the schedule block below once confirmed working
  workflow_dispatch:
    inputs:
      test_notification:
        description: 'Send a test Pushover notification regardless of EMA signal'
        type: boolean
        default: false

jobs:
  check-ema:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas pytz requests

      - name: Run EMA crossover check
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          TEST_NOTIFICATION: ${{ inputs.test_notification }}
        run: python -c "import eur_usd_ema_monitor as m; m.check_ema_crossover()"
