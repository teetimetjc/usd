name: EUR/USD EMA Monitor

on:
  # 9 runs/day: every hour 8 AM–4 PM EST (13:00–21:00 UTC), Mon–Fri
  # Note: during EDT (UTC-4) this shifts to 9 AM–5 PM
  schedule:
    - cron: '0 13-21 * * 1-5'
  workflow_dispatch:
    inputs:
      test_notification:
        description: 'Send a test Pushover notification regardless of EMA signal'
        type: boolean
        default: false

jobs:
  check-ema:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install yfinance pandas pytz requests gspread

      - name: Test Pushover credentials
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
        run: |
          echo "Testing Pushover API directly..."
          curl -s --output - \
            --form-string "token=$PUSHOVER_TOKEN" \
            --form-string "user=$PUSHOVER_USER_KEY" \
            --form-string "message=EUR/USD monitor credential check" \
            --form-string "title=Credential Test" \
            https://api.pushover.net/1/messages.json

      - name: Run EMA crossover check
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          TEST_NOTIFICATION: ${{ inputs.test_notification }}
        run: python -c "import eur_usd_ema_monitor as m; m.check_ema_crossover()"
